<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考研线性代数几何图像化学习系统</title>
    
    <!-- 极速自检错误诊断引擎 (Uncaught Exception Diagnostic Overlay) -->
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            var errDiv = document.getElementById('runtime-error-overlay');
            if (!errDiv) {
                errDiv = document.createElement('div');
                errDiv.id = 'runtime-error-overlay';
                errDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#ef4444;color:#fff;padding:20px;z-index:999999;font-family:monospace;font-size:14px;line-height:1.6;box-shadow:0 4px 20px rgba(0,0,0,0.6);text-align:left;box-sizing:border-box;border-bottom:3px solid #b91c1c;';
                // 等待 body 加载好后插入
                if (document.body) {
                    document.body.insertBefore(errDiv, document.body.firstChild);
                } else {
                    document.documentElement.appendChild(errDiv);
                }
            }
            errDiv.innerHTML = '<h3 style="margin:0 0 10px 0;font-size:16px;color:#fff;font-weight:700;">⚠️ 网页运行时错误诊断 (Uncaught Runtime Exception)</h3>' +
                '<strong>错误消息:</strong> ' + message + '<br>' +
                '<strong>出错文件:</strong> ' + source + '<br>' +
                '<strong>具体位置:</strong> 行号 ' + lineno + ' | 列号 ' + colno + '<br><br>' +
                '<span style="font-size:12.5px;background:rgba(0,0,0,0.2);padding:6px 10px;border-radius:6px;display:block;line-height:1.7;">' +
                '💡 <b>修复建议：</b>这通常是因为浏览器加载了本地缓存的旧脚本，或是直接双击 HTML 文件（被 CORS 策略拦截）。<br>' +
                '1. 请确保您是通过双击 <b>run_local.bat</b>，并在打开的浏览器页面中浏览系统。<br>' +
                '2. 请按下 <b>Ctrl + F5</b> 强制刷新网页，或清除浏览器缓存重新加载！' +
                '</span>';
            return false;
        };
    </script>
    
    <!-- KaTeX 数学公式渲染样式 -->
    <link rel="stylesheet" href="https://npm.elemecdn.com/katex@0.16.8/dist/katex.min.css">
    
    <!-- Google Fonts 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- 统一设计系统样式 -->
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏导航 - 6 大学术章节结构 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="6" y1="3" x2="6" y2="21"></line>
                        <line x1="18" y1="3" x2="18" y2="21"></line>
                        <line x1="3" y1="6" x2="21" y2="18"></line>
                    </svg>
                    <span>线代几何之光</span>
                </div>
                <span class="sub-logo">考研线代大纲全几何映射</span>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li>
                        <button class="nav-item active" data-chapter="1">
                            <span class="nav-icon">Ch1</span>
                            <span class="nav-text">行列式与矩阵基础</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-chapter="2">
                            <span class="nav-icon">Ch2</span>
                            <span class="nav-text">矩阵的四大核心关系</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-chapter="3">
                            <span class="nav-icon">Ch3</span>
                            <span class="nav-text">向量空间与相关性</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-chapter="4">
                            <span class="nav-icon">Ch4</span>
                            <span class="nav-text">线性方程组解空间</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-chapter="5">
                            <span class="nav-icon">Ch5</span>
                            <span class="nav-text">特征值与对角化</span>
                        </button>
                    </li>
                    <li>
                        <button class="nav-item" data-chapter="6">
                            <span class="nav-icon">Ch6</span>
                            <span class="nav-text">二次型与正定性</span>
                        </button>
                    </li>
                </ul>
            </nav>
            
            <div class="sidebar-footer">
                <p>考研线代几何化系统 v2.0</p>
                <div class="github-link-placeholder">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                    </svg>
                    <span>D:\linear</span>
                </div>
            </div>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 几何画布渲染区 - 支持多种渲染模式（单3D, 双3D对比, 单2D, 双2D对比） -->
            <section class="canvas-section">
                <!-- 1. 单 3D 渲染容器 -->
                <div id="three-container" class="canvas-container"></div>
                
                <!-- 2. 双 3D 对比渲染容器 -->
                <div id="three-dual-container" class="canvas-container dual-grid hidden">
                    <div id="three-left" class="sub-canvas">
                        <div class="canvas-label">矩阵 A (或变换前)</div>
                    </div>
                    <div id="three-right" class="sub-canvas">
                        <div class="canvas-label" id="three-right-label">矩阵 B (或变换后)</div>
                    </div>
                </div>
                
                <!-- 3. 单 2D 绘图容器 -->
                <div id="canvas-2d-container" class="canvas-container hidden">
                    <canvas id="main-canvas-2d"></canvas>
                </div>
                
                <!-- 4. 双 2D 对比绘图容器 -->
                <div id="canvas-2d-dual-container" class="canvas-container dual-grid hidden">
                    <div class="sub-canvas-2d">
                        <canvas id="canvas-2d-left"></canvas>
                        <div class="canvas-label">变换 A (输入网格)</div>
                    </div>
                    <div class="sub-canvas-2d">
                        <canvas id="canvas-2d-right"></canvas>
                        <div class="canvas-label" id="canvas-2d-right-label">变换 B (特征网格)</div>
                    </div>
                </div>
                
                <!-- 空间提示说明 -->
                <div class="3d-controls-hint" id="spatial-hint">
                    <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 16v-4"></path>
                        <path d="M12 8h.01"></path>
                    </svg>
                    <span>鼠标拖拽旋转，滚轮缩放，右键平移</span>
                </div>
            </section>
            
            <!-- 控制与代数映射面板 -->
            <section class="control-section">
                <div class="glass-panel">
                    <!-- 动态注入章节与子Tab栏 -->
                    <div class="panel-header">
                        <h2 id="chapter-title">章节标题</h2>
                        <!-- 子标签页导航 (Tabs) -->
                        <div class="sub-tabs-container" id="sub-tabs-bar">
                            <!-- JS 动态注入的子 Tabs -->
                        </div>
                    </div>
                    
                    <!-- 代数公式展示区 (KaTeX 渲染) -->
                    <div class="math-box">
                        <div id="math-formula">公式渲染中...</div>
                    </div>
                    
                    <!-- 交互控制器容器 -->
                    <div class="controls-card">
                        <h3 id="controls-card-title">交互式代数调节 (Sliders)</h3>
                        <div id="controls-container">
                            <!-- 由 JS 动态生成的滑块与按钮 -->
                        </div>
                    </div>
                    
                    <!-- 代数与几何的完美映射图例 -->
                    <div class="mapping-card">
                        <h3>代数 ↔ 几何 映射图例</h3>
                        <div id="mapping-legend" class="legend-container">
                            <!-- 由 JS 动态注入映射对应关系 -->
                        </div>
                    </div>
                    
                    <!-- 考研视点提示 -->
                    <div class="exam-insight-card">
                        <div class="insight-header">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="var(--primary-color)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                                <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                            </svg>
                            <span>考研核心视点 (Exam Insights)</span>
                        </div>
                        <div id="exam-insight-content" class="insight-body">
                            <!-- 考点精要说明 -->
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- KaTeX 数学公式渲染脚本 -->
    <script src="https://npm.elemecdn.com/katex@0.16.8/dist/katex.min.js"></script>
    
    <!-- Three.js 及其控制插件 -->
    <script src="https://npm.elemecdn.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://npm.elemecdn.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- 系统模块入口 -->
    <script type="module" src="app.js"></script>
</body>
</html>
